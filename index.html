 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التاجر للدعاية</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* ===== BODY ===== */
body{
margin:0;
font-family:Arial;
background:#070a12;
color:#fff;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* ===== NAV ===== */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
}

nav a{
color:#fff;
margin:0 10px;
text-decoration:none;
}

nav a:hover{
color:#00ffd5;
}

/* ===== HERO ===== */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
overflow:hidden;
}

/* PARALLAX */
.parallax{
position:absolute;
top:0;
left:0;
width:100%;
height:120%;
background:url('https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
z-index:-1;
transform:translateY(0);
}

/* LOGO */
.logo{
width:140px;
margin-bottom:20px;
filter:drop-shadow(0 0 20px #00ffd5);
}

/* TYPING */
#typing{
font-size:40px;
border-right:3px solid #00ffd5;
white-space:nowrap;
overflow:hidden;
width:0;
}

/* SUB */
.sub{
opacity:.8;
margin-top:10px;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:14px 30px;
background:linear-gradient(45deg,#00ffd5,#00aaff);
color:#000;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

/* ===== SECTIONS ===== */
.section{
padding:80px 20px;
text-align:center;
}

/* ===== SERVICES BG AI ===== */
#services{
position:relative;
overflow:hidden;
}

#services::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
opacity:0.08;
z-index:0;
}

#services h2,
#services .grid{
position:relative;
z-index:2;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

/* ===== CARD ===== */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:25px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.1);
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
border-color:#00ffd5;
}

/* ===== WHATSAPP ===== */
.whatsapp{
position:fixed;
bottom:20px;
left:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:#fff;
text-decoration:none;
}

/* ===== SCROLL ANIMATION ===== */
.reveal{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<h1>التاجر للدعاية</h1>
<div>
<a href="#home">الرئيسية</a>
<a href="#services">الخدمات</a>
<a href="#about">من نحن</a>
<a href="#contact">تواصل</a>
</div>
</nav>

<!-- HERO -->
<header id="home" class="hero">

<div class="parallax"></div>

<img class="logo" src="https://raw.githubusercontent.com/hnanamr656-prog/Company-website/main/logo.jpeg">

<h1 id="typing"></h1>

<p class="sub">إعلانات ممولة • تسويق رقمي • بوتات • مواقع</p>

<a class="btn" href="https://wa.me/201024941083">ابدأ الآن</a>

</header>

<!-- SERVICES -->
<section id="services" class="section reveal">

<h2>خدماتنا</h2>

<div class="grid">

<div class="card"><i class="fa-solid fa-bullhorn"></i> إعلانات ممولة</div>
<div class="card"><i class="fa-solid fa-robot"></i> بوتات تيليجرام</div>
<div class="card"><i class="fa-solid fa-chart-line"></i> زيادة تفاعل</div>
<div class="card"><i class="fa-solid fa-globe"></i> إنشاء مواقع</div>

</div>

</section>

<!-- ABOUT -->
<section id="about" class="section reveal">
<h2>من نحن</h2>
<p>شركة التاجر للدعاية متخصصة في التسويق الرقمي وبناء العلامات التجارية.</p>
</section>

<!-- CONTACT -->
<section id="contact" class="section reveal">
<h2>تواصل معنا</h2>
<a class="btn" href="https://wa.me/201024941083">واتساب مباشر</a>
</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/201024941083">
<i class="fa-brands fa-whatsapp"></i>
</a>

<script>

/* ===== PARALLAX ===== */
window.addEventListener("scroll",()=>{
let p=document.querySelector(".parallax");
if(p){
p.style.transform="translateY("+window.scrollY*0.4+"px)";
}

// scroll reveal
document.querySelectorAll(".reveal").forEach(el=>{
let top=el.getBoundingClientRect().top;
if(top<window.innerHeight-100){
el.classList.add("active");
}
});
});

/* ===== TYPING ===== */
let text="نحوّل فكرتك إلى عملاء 🔥";
let i=0;
function typing(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,100);
}
}
typing();

</script>

</body>
</html>
